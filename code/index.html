<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办事项</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>我的待办事项</h1>
        <div class="input-form">
            <div class="input-row">
                <input type="text" id="todo-input" placeholder="输入待办事项标题...">
            </div>
            <div class="input-row">
                <textarea id="todo-description" placeholder="添加详细描述（可选）..." rows="3"></textarea>
            </div>
            <div class="input-row">
                <label class="date-label">
                    <span>📅 截止日期：</span>
                    <input type="date" id="todo-date" class="date-input">
                </label>
            </div>
            <div class="input-row">
                <button onclick="addTodo()" class="add-btn">✨ 添加待办事项</button>
            </div>
        </div>
        <ul id="todo-list"></ul>
        <div class="stats">
            <span id="total-count">总计: 0</span> |
            <span id="completed-count">已完成: 0</span> |
            <span id="overdue-count">已逾期: 0</span>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
